$kind: http-request
name: Queue List
method: POST
url: '{{baseUrl}}/queue/list'
order: 2100
headers:
  - key: Content-Type
    value: application/json
  - key: X-API-Key
    value: '{{apiKey}}'
body:
  type: json
  content: |-
    {
      "region": "EU",
      "queue_type": "regular",
      "ranked_tier": null,
      "team_format": "5v5",
      "page": 1,
      "page_size": 10
    }
