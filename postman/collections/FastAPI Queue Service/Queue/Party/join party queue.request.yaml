$kind: http-request
name: Join Party Queue
method: POST
url: '{{baseUrl}}/queue/join/party'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: X-API-Key
    value: '{{apiKey}}'
    description: API key for authentication
body:
  type: json
  content: |-
    {
      "party_id": "party_abc123",
      "region": "EU",
      "members": [
        {
          "user_id": 123456789,
          "positions": ["GK", "CB"],
          "player_level": 45
        },
        {
          "user_id": 987654321,
          "positions": ["CM", "ST"],
          "player_level": 48
        }
      ],
      "team_format": "5v5",
      "queue_type": "regular",
      "ranked_tier": null
    }
